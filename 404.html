<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Overwatch 2</title>
    <link rel="stylesheet" href="static/css/w3.css">
    <link rel="stylesheet" href="static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="media/favicon.ico">
    <script src="https://kit.fontawesome.com/324d5be901.js" crossorigin="anonymous" async></script>
    <script src="static/js/w3.js"></script>
</head>

<body>
    <!-- Nav Bar -->
    <header data-include-html="includes/header.html"></header>

    <main class="error-container">
        <div class="floating-icons">
            <i class="fa fa-gamepad floating-icon" style="font-size: 48px;"></i>
            <i class="fa fa-shield floating-icon" style="font-size: 40px;"></i>
            <i class="fa fa-crosshairs floating-icon" style="font-size: 32px;"></i>
            <i class="fa fa-bolt floating-icon" style="font-size: 44px;"></i>
            <i class="fa fa-star floating-icon" style="font-size: 35px;"></i>
        </div>

        <div class="error-content">
            <h1 class="error-404">404</h1>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-message">Oops! looks like the resource you reqested does not exist</p>
            <a href="index.html" class="back-home-btn">Go Home</a>
        </div>
    </main>

    <!-- Footer -->
    <footer data-include-html="includes/footer.html"></footer>

    <script>
        w3.includeHTML();

        function toggleMenu() {
            var menu = document.getElementById("mobileMenu");
            menu.classList.toggle("open");
        }
    </script>
</body>

</html>
